<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Stack Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1c0808;
      --header-h: 72px;
      --card-side-pad: 4vw;
      --radius: 18px;
    }

    html {
      scroll-behavior: auto;
    }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* ─── STAGE WRAPPER ─── */
    #stage-wrapper {
      position: relative;
    }

    /* ─── STICKY STAGE ─── */
    #stage {
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow: hidden;
    }

    /* ─── CARDS CONTAINER ─── */
    #cards-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ─── INDIVIDUAL CARD ─── */
    .project-card {
      position: absolute;
      inset: 0;
      padding: 0 var(--card-side-pad);
      will-change: transform;
      display: flex;
      flex-direction: column;
    }

    .card-inner {
      flex: 1;
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-bottom: none;
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    /* ─── LIQUID METAL SHADER BACKGROUND ─── */
    .card-shader-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .card-shader-bg canvas {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
    }

    /* ─── CARD HEADER ─── */
    .card-header {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: relative;
      z-index: 2;
      overflow: hidden;
      /* Dark veil so title stays legible over the metal */
      background: rgba(0, 0, 0, 0.28);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.10),
        inset 0 -1px 0 rgba(0, 0, 0, 0.20);
    }

    /* Darkening overlay for stacked cards */
    .card-header-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 2, 2, 0.75);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
      color: rgba(255, 255, 255, 0.88);
      letter-spacing: -0.01em;
      position: relative;
      z-index: 2;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.5);
    }

    .card-arrow {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 2;
    }

    .card-arrow svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>

  <!-- ─── SCROLL STACK ─── -->
  <div id="stage-wrapper">
    <div id="stage">
      <div id="cards-container">

        <!-- Card 0: Dixon Ticonderoga -->
        <div class="project-card" data-index="0">
          <div class="card-inner">
            <div class="card-shader-bg" data-angle="30" data-offset-x="0.05" data-offset-y="-0.08"></div>
            <div class="card-header">
              <span class="card-title">dixon ticonderoga</span>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="card-header-overlay"></div>
            </div>
          </div>
        </div>

        <!-- Card 1: Aquaflow -->
        <div class="project-card" data-index="1">
          <div class="card-inner">
            <div class="card-shader-bg" data-angle="55" data-offset-x="-0.1" data-offset-y="0.05"></div>
            <div class="card-header">
              <span class="card-title">aquaflow</span>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="card-header-overlay"></div>
            </div>
          </div>
        </div>

        <!-- Card 2: Snackify -->
        <div class="project-card" data-index="2">
          <div class="card-inner">
            <div class="card-shader-bg" data-angle="80" data-offset-x="0.15" data-offset-y="0.12"></div>
            <div class="card-header">
              <span class="card-title">snackify</span>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="card-header-overlay"></div>
            </div>
          </div>
        </div>

        <!-- Card 3: Zengo -->
        <div class="project-card" data-index="3">
          <div class="card-inner">
            <div class="card-shader-bg" data-angle="110" data-offset-x="-0.05" data-offset-y="-0.15"></div>
            <div class="card-header">
              <span class="card-title">zengo</span>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="card-header-overlay"></div>
            </div>
          </div>
        </div>

        <!-- Card 4: Roverride -->
        <div class="project-card" data-index="4">
          <div class="card-inner">
            <div class="card-shader-bg" data-angle="145" data-offset-x="0.2" data-offset-y="-0.05"></div>
            <div class="card-header">
              <span class="card-title">roverride</span>
              <div class="card-arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.70)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14M13 6l6 6-6 6"/>
                </svg>
              </div>
              <div class="card-header-overlay"></div>
            </div>
          </div>
        </div>

      </div><!-- /cards-container -->
    </div><!-- /stage -->
  </div><!-- /stage-wrapper -->

  <!-- ─── LIQUID METAL SHADERS ─── -->
  <script type="module">
    try {
      const { ShaderMount, liquidMetalFragmentShader } = await import('https://esm.sh/@paper-design/shaders');

      document.querySelectorAll('.card-shader-bg').forEach((container) => {
        const angle   = parseFloat(container.dataset.angle   ?? 45);
        const offsetX = parseFloat(container.dataset.offsetX ?? 0.1);
        const offsetY = parseFloat(container.dataset.offsetY ?? -0.1);

        new ShaderMount(container, liquidMetalFragmentShader, {
          u_repetition: 3.5,
          u_softness:   0.5,
          u_shiftRed:   0.3,
          u_shiftBlue:  0.3,
          u_distortion: 0,
          u_contour:    0,
          u_angle:      angle,
          u_scale:      6,
          u_shape:      1,
          u_offsetX:    offsetX,
          u_offsetY:    offsetY,
        }, undefined, 0.5);
      });
    } catch (e) {
      console.error('[shader] failed to load:', e);
    }
  </script>

  <!-- ─── GSAP SCROLL ANIMATION ─── -->
  <script>
    gsap.registerPlugin(ScrollTrigger);

    const HEADER_H = 72; // px — matches --header-h CSS var
    const cards    = gsap.utils.toArray('.project-card');
    const numCards = cards.length;

    // ── Set initial positions ────────────────────────────────────────────
    cards.forEach((card, i) => {
      if (i > 0) {
        gsap.set(card, { y: '100vh' });
      }
    });

    // ── Scroll space ─────────────────────────────────────────────────────
    const wrapper = document.getElementById('stage-wrapper');
    wrapper.style.height = `${(numCards - 1) * 100 + 100}vh`;

    // ── Master scrubbed timeline ──────────────────────────────────────────
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: '#stage-wrapper',
        start: 'top top',
        end: () => `+=${(numCards - 1) * window.innerHeight}`,
        scrub: 0.6,
      }
    });

    cards.forEach((card, i) => {
      if (i === 0) return;

      tl.to(card, {
        y: i * HEADER_H,
        ease: 'none',
        duration: 1,
      }, i - 1);
    });

    // ── Darken stacked card headers ──────────────────────────────────────
    cards.forEach((card, i) => {
      if (i === 0) return;

      for (let prev = 0; prev < i; prev++) {
        const overlay = cards[prev].querySelector('.card-header-overlay');
        const targetOpacity = Math.min(0.18 * (i - prev), 0.55);
        tl.to(overlay, {
          opacity: targetOpacity,
          ease: 'none',
          duration: 0.5,
        }, i - 1);
      }
    });
  </script>
</body>
</html>
